{% extends "base.html" %}

{% block content %}

<h2>Manage Students</h2>

<table border="1" width="100%">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Gender</th>
    <th>Phone</th>
    <th>Email</th>
    <th>Course</th>
    <th>Room</th>
</tr>

{% for s in students %}
<tr>
    <td>{{ s[0] }}</td>
    <td>{{ s[1] }}</td>
    <td>{{ s[2] }}</td>
    <td>{{ s[3] }}</td>
    <td>{{ s[4] }}</td>
    <td>{{ s[5] }}</td>
    <td>{{ s[7] }}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
