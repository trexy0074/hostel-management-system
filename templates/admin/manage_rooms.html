{% extends "base.html" %}

{% block content %}

<h2>Manage Rooms</h2>

<table border="1" width="100%">
<tr>
    <th>ID</th>
    <th>Room No</th>
    <th>Type</th>
    <th>Capacity</th>
    <th>Occupied</th>
    <th>Status</th>
</tr>

{% for r in rooms %}
<tr>
    <td>{{ r[0] }}</td>
    <td>{{ r[1] }}</td>
    <td>{{ r[2] }}</td>
    <td>{{ r[3] }}</td>
    <td>{{ r[4] }}</td>
    <td>{{ r[5] }}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
