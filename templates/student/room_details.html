{% extends "base.html" %}

{% block content %}

<h2>Room Details</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Number</th>
    <th>Type</th>
    <th>Status</th>
</tr>

{% for r in rooms %}
<tr>
    <td>{{ r[0] }}</td>
    <td>{{ r[1] }}</td>
    <td>{{ r[2] }}</td>
    <td>{{ r[3] }}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
